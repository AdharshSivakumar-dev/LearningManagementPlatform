<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat Analytics • Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="bg-m3-surface">
    <nav class="navbar navbar-expand-lg shadow-sm m3-appbar">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/admin/">LMS Admin</a>
        <span class="navbar-text text-muted">Chat Analytics</span>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="text-muted">Messages Today</h6><h3 id="stat-messages">0</h3></div></div>
        </div>
        <div class="col-md-3">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="text-muted">Active Rooms</h6><h3 id="stat-rooms">0</h3></div></div>
        </div>
        <div class="col-md-3">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="text-muted">Online Users</h6><h3 id="stat-online">0</h3></div></div>
        </div>
        <div class="col-md-3">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="text-muted">Files Today</h6><h3 id="stat-files">0</h3></div></div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="mb-3">Messages per Day (30d)</h6><canvas id="chart1" height="160"></canvas></div></div>
        </div>
        <div class="col-md-6">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="mb-3">Top 10 Users</h6><canvas id="chart2" height="160"></canvas></div></div>
        </div>
        <div class="col-md-6">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="mb-3">Room Activity</h6><canvas id="chart3" height="160"></canvas></div></div>
        </div>
        <div class="col-md-6">
          <div class="card m3-card shadow-sm"><div class="card-body"><h6 class="mb-3">File Shares per Day (30d)</h6><canvas id="chart4" height="160"></canvas></div></div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
      async function getSeries(path){ const r = await fetch(path, {credentials:'include'}); return (await r.json()).series || []; }
      async function getStats(){
        try {
            const r = await fetch('/admin-api/chat/stats/', {credentials:'include'});
            const d = await r.json();
            document.getElementById('stat-messages').innerText = d.messages_today;
            document.getElementById('stat-rooms').innerText = d.active_rooms;
            document.getElementById('stat-online').innerText = d.online_users;
            document.getElementById('stat-files').innerText = d.files_today;
        } catch(e) { console.error(e); }
      }
      (async () => {
        getStats();
        const m = await getSeries('/admin-api/chat/messages-per-day/');
        const u = await getSeries('/admin-api/chat/top-users/');
        const ra = await getSeries('/admin-api/chat/room-activity/');
        const f = await getSeries('/admin-api/chat/file-shares-per-day/');
        const pastel = ['#A7C7E7','#F7C8E0','#CDEAC0','#FBE7C6','#E2ECE9','#D8E2DC'];

        new Chart(document.getElementById('chart1').getContext('2d'), {
          type: 'line', data: { labels: m.map(d=>d.label), datasets: [{ data: m.map(d=>d.value), borderColor:'#6ea8fe', tension:.35 } ] },
          options:{ plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true}} }
        });
        new Chart(document.getElementById('chart2').getContext('2d'), {
          type: 'bar', data: { labels: u.map(d=>d.label), datasets: [{ data: u.map(d=>d.value), backgroundColor: pastel }]},
          options:{ plugins:{legend:{display:false}}, indexAxis:'y', scales:{ x:{beginAtZero:true}} }
        });
        new Chart(document.getElementById('chart3').getContext('2d'), {
          type: 'doughnut', data: { labels: ra.map(d=>d.label), datasets: [{ data: ra.map(d=>d.value), backgroundColor: pastel }]},
          options:{ plugins:{legend:{position:'bottom'}} }
        });
        new Chart(document.getElementById('chart4').getContext('2d'), {
          type: 'bar', data: { labels: f.map(d=>d.label), datasets: [{ data: f.map(d=>d.value), backgroundColor: '#a7c7e7' }]},
          options:{ plugins:{legend:{display:false}}, scales:{ y:{beginAtZero:true}} }
        });
      })();
    </script>
  </body>
</html>
