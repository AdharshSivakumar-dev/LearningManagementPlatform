<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="bg-m3-surface">
    <nav class="navbar navbar-expand-lg shadow-sm m3-appbar">
      <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="/admin/">
          <span class="material-symbols-rounded">notifications</span> Notifications
        </a>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Notifications</h5>
        <button class="btn btn-outline-primary btn-sm" id="markAll">Mark all as read</button>
      </div>
      <div id="list" class="list-group"></div>
    </main>

    <script>
      const api = 'http://localhost:8001';
      async function authFetch(path, opts={}){
        const t = localStorage.getItem('token') || '';
        opts.headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + t });
        return fetch(api + path, opts);
      }
      async function load(){
        const r = await authFetch('/notifications/');
        const arr = await r.json();
        const list = document.getElementById('list');
        list.innerHTML = '';
        for(const n of arr){
          const a = document.createElement('a');
          a.href = '#';
          a.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
          a.innerHTML = `<div><div class="${n.is_read?'':'border-start border-3 border-primary ps-2'}">${n.message}</div><small class="text-muted">${new Date(n.created_at).toLocaleString()}</small></div><span class="badge ${n.is_read?'text-bg-secondary':'text-bg-primary'}">${n.is_read?'read':'new'}</span>`;
          list.appendChild(a);
        }
      }

      function connectNotifWS(){
        const t = localStorage.getItem('token');
        const uid = localStorage.getItem('user_id');
        if(!t || !uid) return;
        const ws = new WebSocket(`ws://localhost:8001/notifications/ws/notifications/${uid}?token=${t}`);
        ws.onmessage = ev => { load(); };
      }

      document.getElementById('markAll').onclick = async () => {
        await authFetch('/notifications/read-all/', { method:'PATCH' });
        load();
      };
      if(!localStorage.getItem('token')) location.href='/admin/chat/';
      load();
      connectNotifWS();
    </script>
  </body>
</html>
