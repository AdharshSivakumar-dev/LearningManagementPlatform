<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Success • Learning Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .icon-circle {
            width: 96px;
            height: 96px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        .icon-circle .material-symbols-rounded {
            font-size: 48px;
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="icon-circle">
            <span class="material-symbols-rounded">check</span>
        </div>
        <h2 class="fw-bold mb-3">Payment Successful!</h2>
        <p class="text-muted mb-4">
            Thank you for your purchase. Your account has been updated, and you can now access your new content.
        </p>
        <a href="/student/dashboard/" class="btn btn-primary rounded-pill px-5 py-2 fw-medium">
            Go to Dashboard
        </a>
    </div>
</body>

</html>
